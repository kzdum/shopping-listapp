<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    .input-row input:focus {
      border-color: #5c6bc0;
    }

    .input-row button {
      padding: 12px 20px;
      background: #5c6bc0;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3f51b5;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .clear-done {
      background: none;
      border: none;
      color: #e57373;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 2px 0;
    }

    .clear-done:hover {
      text-decoration: underline;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #fafafa;
      border: 1.5px solid #ebebeb;
      border-radius: 10px;
      transition: opacity 0.2s, background 0.2s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.done {
      background: #f5f5f5;
      opacity: 0.65;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #5c6bc0;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.97rem;
      color: #333;
      word-break: break-word;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e57373;
      background: #fdecea;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">오늘 사야 할 것들</p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats">
      <span id="statsText">항목 없음</span>
      <button class="clear-done" onclick="clearDone()">완료 항목 삭제</button>
    </div>

    <ul class="list" id="list"></ul>
    <p class="empty" id="empty">리스트가 비어 있어요.</p>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    const listEl   = document.getElementById('list');
    const emptyEl  = document.getElementById('empty');
    const statsEl  = document.getElementById('statsText');
    const inputEl  = document.getElementById('itemInput');

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      listEl.innerHTML = '';
      items.forEach((item, i) => {
        const li = document.createElement('li');
        li.className = 'item' + (item.done ? ' done' : '');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.done;
        cb.onchange = () => toggle(i);

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.name;

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '×';
        btn.title = '삭제';
        btn.onclick = () => removeItem(i);

        li.append(cb, span, btn);
        listEl.appendChild(li);
      });

      const total = items.length;
      const done  = items.filter(x => x.done).length;
      emptyEl.style.display = total === 0 ? 'block' : 'none';
      statsEl.textContent = total === 0
        ? '항목 없음'
        : `전체 ${total}개 · 완료 ${done}개`;
    }

    function addItem() {
      const name = inputEl.value.trim();
      if (!name) return;
      items.unshift({ name, done: false });
      inputEl.value = '';
      save();
      render();
    }

    function toggle(i) {
      items[i].done = !items[i].done;
      save();
      render();
    }

    function removeItem(i) {
      items.splice(i, 1);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(x => !x.done);
      save();
      render();
    }

    render();
  </script>
</body>
</html>
